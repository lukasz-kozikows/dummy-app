<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>QuoteApp</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .box { padding: 16px; border: 1px solid #ddd; border-radius: 12px; max-width: 1000px;}
    table { border-collapse: collapse; width: 100%; margin-top: 12px;}
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left;}
    th { background: #f6f6f6; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .pill { background: #eef; padding: 6px 10px; border-radius: 999px; }
    select, button { padding: 8px; border-radius: 10px; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <div class="box">
    <div class="row">
      <h2 style="margin:0;">QuoteApp</h2>
      <span class="pill">Host: <b>{{ hostname }}</b></span>
    </div>

    <form method="get" style="margin-top: 12px;" class="row">
      <label for="limit">Ile rekordów pokazać?</label>
      <select name="limit" id="limit">
        {% for opt in [10, 25, 50, 100, 200, 500] %}
          <option value="{{ opt }}" {% if opt == limit %}selected{% endif %}>{{ opt }}</option>
        {% endfor %}
      </select>
      <button type="submit">Odśwież</button>
    </form>

    <table>
      <thead>
        <tr><th>ID</th><th>Data i godzina</th><th>Cytat</th></tr>
      </thead>
      <tbody>
        {% for r in rows %}
          <tr><td>{{ r[0] }}</td><td>{{ r[1] }}</td><td>{{ r[2] }}</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
